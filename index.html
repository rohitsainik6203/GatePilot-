<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GatePilot AI</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>GatePilot AI</h1>
        <h2 id="greeting"></h2>
<p id="clock"></p>

        <select id="branch">
            <option>CSE</option>
            <option>ECE</option>
            <option>EEE</option>
            <option>ME</option>
            <option>CE</option>
        </select>

        <div class="card">
            <h2>GATE Countdown</h2>
            <p id="countdown">Loading...</p>
        </div>

        <div class="card">
            <h2>Today's Target</h2>
            <p id="target-subject">Operating Systems</p>
        </div>

        <div class="card">
            <h2>Progress</h2>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>

            <p id="progress-text"></p>

        </div>

        <div class="card">
            <h2>AI Recommendation</h2>
            <p id="recommendation"></p>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
